<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>生涯規劃助手</title>

<style>

/* ========================= */
/* 全域 */
/* ========================= */

body{
    margin:0;
    font-family:"Microsoft JhengHei",sans-serif;
    background:linear-gradient(to bottom,#eef4ff,#f8fbff);
}

/* ========================= */
/* 上方 */
/* ========================= */

.topbar{
    background:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
    border-bottom:2px solid #ddd;
}

.logo{
    font-size:38px;
    font-weight:bold;
}

.home{
    font-size:24px;
    cursor:pointer;
}

/* ========================= */
/* 頁面 */
/* ========================= */

.page{
    display:none;
    padding:40px;
    animation:fade 0.4s;
}

.active{
    display:block;
}

@keyframes fade{

from{
    opacity:0;
    transform:translateY(10px);
}

to{
    opacity:1;
    transform:translateY(0);
}

}

/* ========================= */
/* 首頁 */
/* ========================= */

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
}

.card{
    background:white;
    border-radius:25px;
    padding:30px;
    text-align:center;
    border:2px solid #ddd;
    transition:0.3s;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card:hover{
    transform:translateY(-5px);
}

.card h2{
    font-size:30px;
}

.card p{
    font-size:20px;
}

/* ========================= */
/* 按鈕 */
/* ========================= */

button{
    border:none;
    border-radius:12px;
    padding:15px 25px;
    color:white;
    font-size:18px;
    cursor:pointer;
    margin-top:20px;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    opacity:0.9;
}

.blue{
    background:#4d8df7;
}

.green{
    background:#00b050;
}

.orange{
    background:#d89b00;
}

.purple{
    background:#7d3cb5;
}

.gray{
    background:#888;
}

/* ========================= */
/* 測驗 */
/* ========================= */

.title{
    font-size:45px;
    font-weight:bold;
}

.blue-text{
    color:#4d8df7;
}

.green-text{
    color:#00b050;
}

.sub{
    margin-top:10px;
    font-size:22px;
}

.box{
    background:white;
    margin-top:30px;
    padding:40px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.question{
    font-size:32px;
    margin:30px 0;
    font-weight:bold;
}

.answers{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
}

.answer{
    background:white;
    border:2px solid #ddd;
    border-radius:20px;
    min-height:120px;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
    font-size:22px;
    cursor:pointer;
    transition:0.2s;
}

.answer:hover{
    background:#eef4ff;
    transform:translateY(-3px);
}

.selected{
    border:3px solid #4d8df7;
    background:#dfeaff;
}

.selected-green{
    border:3px solid #00b050;
    background:#def7e6;
}

/* ========================= */
/* 進度條 */
/* ========================= */

.progress{
    width:100%;
    height:16px;
    background:#eee;
    border-radius:10px;
    overflow:hidden;
    margin-top:20px;
}

.progress-bar{
    height:100%;
    transition:0.3s;
}

.progress-blue{
    background:#4d8df7;
}

.progress-green{
    background:#00b050;
}

/* ========================= */
/* 下方按鈕 */
/* ========================= */

.buttons{
    display:flex;
    justify-content:space-between;
    margin-top:40px;
    flex-wrap:wrap;
    gap:20px;
}

/* ========================= */
/* 結果 */
/* ========================= */

.result-text{
    font-size:28px;
    margin-top:30px;
    line-height:2;
}

.notice{
    margin-top:40px;
    background:#fff6bf;
    border:2px solid #d9c85f;
    border-radius:15px;
    padding:20px;
    font-size:22px;
}

.footer{
    margin-top:40px;
    text-align:center;
    font-size:18px;
}

/* ========================= */
/* 手機版 */
/* ========================= */

@media(max-width:768px){

.topbar{
    padding:15px;
}

.logo{
    font-size:28px;
}

.title{
    font-size:35px;
}

.question{
    font-size:24px;
}

}

</style>

</head>

<body>

<!-- ========================= -->
<!-- 上方 -->
<!-- ========================= -->

<div class="topbar">

<div class="logo">
生涯規劃助手
</div>

<div class="home"
onclick="showPage('homePage')">
🏠 首頁
</div>

</div>

<!-- ========================= -->
<!-- 首頁 -->
<!-- ========================= -->

<div id="homePage"
class="page active">

<div class="cards">

<div class="card">

<h2 style="color:#4d8df7;">
興趣測驗
</h2>

<p>
了解你的興趣方向
</p>

<button class="blue"
onclick="startQuiz('interest')">

開始測驗

</button>

</div>

<div class="card">

<h2 style="color:#00b050;">
能力評估
</h2>

<p>
了解你的能力強項
</p>

<button class="green"
onclick="startQuiz('ability')">

開始評估

</button>

</div>

<div class="card">

<h2 style="color:#d89b00;">
職業探索
</h2>

<p>
探索未來工作方向
</p>

<button class="orange">
開始探索
</button>

</div>

<div class="card">

<h2 style="color:#7d3cb5;">
生涯規劃
</h2>

<p>
規劃你的未來目標
</p>

<button class="purple">
開始規劃
</button>

</div>

</div>

<div class="notice">

⭐ 小提醒：  
每個人都有不同的優勢與興趣，慢慢探索，你一定能找到適合自己的方向！

</div>

<div class="footer">
© 2024 生涯規劃助手
</div>

</div>

<!-- ========================= -->
<!-- 興趣測驗 -->
<!-- ========================= -->

<div id="interestPage"
class="page">

<div class="title blue-text">
興趣測驗
</div>

<div class="sub">
找出你喜歡的方向
</div>

<div class="box">

<div id="interestCount">
第 1 題 / 共 10 題
</div>

<div class="progress">

<div id="interestProgress"
class="progress-bar progress-blue"
style="width:10%;">
</div>

</div>

<div id="interestQuestion"
class="question">
</div>

<div id="interestAnswers"
class="answers">
</div>

<div class="buttons">

<button class="gray"
onclick="goPrev('interest')">

← 上一題

</button>

<button class="blue"
onclick="goNext('interest')">

下一題 →

</button>

</div>

</div>

</div>

<!-- ========================= -->
<!-- 能力評估 -->
<!-- ========================= -->

<div id="abilityPage"
class="page">

<div class="title green-text">
能力評估
</div>

<div class="sub">
了解你的能力優勢
</div>

<div class="box">

<div id="abilityCount">
第 1 題 / 共 8 題
</div>

<div class="progress">

<div id="abilityProgress"
class="progress-bar progress-green"
style="width:12%;">
</div>

</div>

<div id="abilityQuestion"
class="question">
</div>

<div id="abilityAnswers"
class="answers">
</div>

<div class="buttons">

<button class="gray"
onclick="goPrev('ability')">

← 上一題

</button>

<button class="green"
onclick="goNext('ability')">

下一題 →

</button>

</div>

</div>

</div>

<!-- ========================= -->
<!-- 結果頁 -->
<!-- ========================= -->

<div id="resultPage"
class="page">

<div class="title blue-text">
測驗結果
</div>

<div class="box">

<h1 id="resultTitle">
完成測驗
</h1>

<div id="resultText"
class="result-text">
結果內容
</div>

<div class="buttons">

<button class="blue"
onclick="showPage('homePage')">

返回首頁

</button>

<button class="green"
onclick="restartQuiz()">

重新測驗

</button>

</div>

</div>

</div>

<script>

const quizzes = {

interest:[

{
q:"1. 下列哪一項活動你最喜歡？",
a:["閱讀書籍","畫畫創作","解數學題","打球運動"]
},

{
q:"2. 你最期待的課程是？",
a:["國文課","美術課","自然課","體育課"]
},

{
q:"3. 假日時你通常會？",
a:["看小說","做手作","研究新知","出去玩"]
},

{
q:"4. 你比較喜歡哪種工作方式？",
a:["寫文章","設計作品","分析問題","動手實作"]
},

{
q:"5. 你看到新事物時會先？",
a:["閱讀介紹","觀察外觀","了解原理","直接試玩"]
},

{
q:"6. 你最有成就感的是？",
a:["完成作文","完成作品","解出難題","完成挑戰"]
},

{
q:"7. 朋友通常會找你幫忙？",
a:["寫文字","畫圖設計","解決問題","活動安排"]
},

{
q:"8. 你最喜歡哪種類型影片？",
a:["故事分享","藝術創作","科學知識","冒險挑戰"]
},

{
q:"9. 你比較想參加哪種社團？",
a:["文學社","美術社","科學社","籃球社"]
},

{
q:"10. 如果未來工作，你希望？",
a:["表達想法","創造作品","研究發明","四處活動"]
}

],

ability:[

{
q:"1. 當遇到困難時，你通常會？",
a:["冷靜思考","找資料","詢問別人","直接行動"]
},

{
q:"2. 你做事情時最重視？",
a:["細節","創意","效率","速度"]
},

{
q:"3. 別人最常稱讚你？",
a:["細心","有美感","聰明","有活力"]
},

{
q:"4. 在團隊中你通常是？",
a:["規劃者","創作者","分析者","執行者"]
},

{
q:"5. 你比較擅長？",
a:["整理內容","設計圖片","邏輯推理","帶動氣氛"]
},

{
q:"6. 面對新挑戰時你會？",
a:["先規劃","想新方法","分析問題","直接開始"]
},

{
q:"7. 你認為自己的優點是？",
a:["耐心","想像力","判斷力","行動力"]
},

{
q:"8. 你最喜歡完成哪種事情？",
a:["整理報告","設計作品","解決問題","完成任務"]
}

]

};

let currentQuiz = "";
let currentIndex = 0;

let selectedAnswers = {
interest:[],
ability:[]
};

function showPage(pageId){

document.querySelectorAll(".page")
.forEach(page=>{
page.classList.remove("active");
});

document.getElementById(pageId)
.classList.add("active");

}

function startQuiz(type){

currentQuiz = type;
currentIndex = 0;

selectedAnswers[type] = [];

renderQuiz();

if(type==="interest"){
showPage("interestPage");
}else{
showPage("abilityPage");
}

}

function renderQuiz(){

let data = quizzes[currentQuiz];

let questionBox;
let answerBox;
let countBox;
let progressBar;

if(currentQuiz==="interest"){

questionBox =
document.getElementById("interestQuestion");

answerBox =
document.getElementById("interestAnswers");

countBox =
document.getElementById("interestCount");

progressBar =
document.getElementById("interestProgress");

}else{

questionBox =
document.getElementById("abilityQuestion");

answerBox =
document.getElementById("abilityAnswers");

countBox =
document.getElementById("abilityCount");

progressBar =
document.getElementById("abilityProgress");

}

questionBox.innerHTML =
data[currentIndex].q;

countBox.innerHTML =
"第 " + (currentIndex+1)
+ " 題 / 共 "
+ data.length + " 題";

progressBar.style.width =
((currentIndex+1)/data.length*100) + "%";

answerBox.innerHTML = "";

data[currentIndex].a.forEach((answer,index)=>{

let btn = document.createElement("div");

btn.className = "answer";

if(selectedAnswers[currentQuiz][currentIndex]===index){

if(currentQuiz==="interest"){
btn.classList.add("selected");
}else{
btn.classList.add("selected-green");
}

}

btn.innerHTML = answer;

btn.onclick = function(){

selectedAnswers[currentQuiz][currentIndex]
= index;

renderQuiz();

};

answerBox.appendChild(btn);

});

}

function goNext(type){

if(selectedAnswers[type][currentIndex]==null){

alert("請先選擇答案！");
return;

}

let data = quizzes[type];

if(currentIndex < data.length-1){

currentIndex++;
renderQuiz();

}else{

showResult(type);

}

}

function goPrev(type){

if(currentIndex>0){

currentIndex--;
renderQuiz();

}else{

showPage("homePage");

}

}

function showResult(type){

let resultTitle =
document.getElementById("resultTitle");

let resultText =
document.getElementById("resultText");

let answers = selectedAnswers[type];

let score = [0,0,0,0];

answers.forEach(ans=>{

score[ans]++;

});

let max = Math.max(...score);

let result = score.indexOf(max);

if(type==="interest"){

resultTitle.innerHTML =
"🎉 興趣測驗完成";

if(result===0){

resultText.innerHTML =

"📚 你是「文學表達型」<br><br>"
+
"你喜歡閱讀、寫作與表達想法。<br><br>"
+
"💼 適合方向：<br>"
+
"作家、老師、記者、自媒體創作者。";

}

else if(result===1){

resultText.innerHTML =

"🎨 你是「創意設計型」<br><br>"
+
"你具有豐富創意與美感。<br><br>"
+
"💼 適合方向：<br>"
+
"設計師、插畫家、動畫師、攝影師。";

}

else if(result===2){

resultText.innerHTML =

"🧠 你是「分析研究型」<br><br>"
+
"你擅長邏輯思考與分析問題。<br><br>"
+
"💼 適合方向：<br>"
+
"工程師、研究員、程式設計師。";

}

else{

resultText.innerHTML =

"⚡ 你是「行動領導型」<br><br>"
+
"你喜歡挑戰與實際行動。<br><br>"
+
"💼 適合方向：<br>"
+
"企業管理、創業家、運動員。";

}

}else{

resultTitle.innerHTML =
"🎉 能力評估完成";

if(result===0){

resultText.innerHTML =

"📖 你的優勢是「細心與規劃能力」<br><br>"
+
"你做事有條理且穩定。<br><br>"
+
"💼 推薦方向：<br>"
+
"行政管理、秘書、教師。";

}

else if(result===1){

resultText.innerHTML =

"🎨 你的優勢是「創造力」<br><br>"
+
"你擁有豐富想像力與創新能力。<br><br>"
+
"💼 推薦方向：<br>"
+
"設計、影音創作、美術。";

}

else if(result===2){

resultText.innerHTML =

"🧠 你的優勢是「分析能力」<br><br>"
+
"你擅長邏輯推理與問題分析。<br><br>"
+
"💼 推薦方向：<br>"
+
"工程、資訊、數據分析。";

}

else{

resultText.innerHTML =

"🚀 你的優勢是「行動力」<br><br>"
+
"你擁有很強的執行能力。<br><br>"
+
"💼 推薦方向：<br>"
+
"創業、業務、團隊領導。";

}

}

showPage("resultPage");

}

function restartQuiz(){

showPage("homePage");

}

</script>

</body>
</html>
